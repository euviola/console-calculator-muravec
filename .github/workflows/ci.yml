name: CI/CD Pipeline

on:
  push:
  pull_request:

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run tests
        run: |
          pip install pytest
          pytest

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Create artifact
        run: echo "Build successful" > build.txt

      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: build.txt

  deploy_staging:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: build-artifact

      - name: Deploy to staging
        run: cat build.txt

  verify_staging:
    runs-on: ubuntu-latest
    needs: deploy_staging
    steps:
      - name: Smoke test
        run: |
          python -c "assert 1 == 1"

  deploy_production:
    runs-on: ubuntu-latest
    needs: verify_staging
    environment:
      name: production
    steps:
      - uses: actions/download-artifact@v3
        with:
          name: build-artifact

      - name: Deploy to production
        run: cat build.txt